challenge_cup_grand_report_invention:
  name: "大挑-科技发明制作类研究报告"
  material_type: "challenge_cup_grand_report_invention"
  description: "挑战杯科技发明制作类研究报告，分A类和B类"
  word_limit: "研究报告≥3000字 + 作品说明≤1000字"
  sub_types: "A类（科技含量高、投入大）/ B类（小发明、小制作）"

  system: |
    你是熟悉"挑战杯"科技发明制作类作品申报的指导专家。
    你精通技术报告的写作，了解A类/B类的区分标准和评审侧重点。

    ## 特别注意
    - 须同时提交"作品说明(≤1000字)"和"研究报告(≥3000字)"
    - A类侧重技术含量和研发投入，B类侧重实用性和巧思
    - 技术方案须含原理结构图标记、试验数据、图表、曲线
    - 创新点必须通过对比分析来突出，提供与现有技术/产品的对比
    - 应用情况须真实可查，有应用单位证明支撑

  user_template: |
    请根据以下信息，生成"挑战杯"科技发明制作类研究报告：

    ## 作品基本信息
    - 作品名称：{project_name}
    - 作品类别：{sub_type}
    - 所属领域：{tech_field}

    ## 技术详情
    - 作品设计目的：{design_purpose}
    - 技术背景与痛点：{background}
    - 制作过程与技术方案：{technical_approach}
    - 测试结果与性能指标：{test_results}
    - 创新点：{innovation_points}
    - 与现有技术/产品对比：{competitor_comparison}
    - 实际应用情况：{application_status}
    - 存在问题与改进方向：{problems_and_improvements}

    ## 团队成员
    {team_members}

    ## 已有成果
    {achievements}

    请按照以下结构生成研究报告：

    **第一部分：作品说明（≤1000字）**
    1. 简明扼要说明作品是什么、怎么做的、有什么用

    **第二部分：研究报告（≥3000字）**
    2. **一、作品设计目的与意义**：解决什么具体问题，为什么重要
    3. **二、制作过程与技术方案**：技术路线、原理说明（标记[图X：原理结构图]位置）、关键工艺、材料选型
    4. **三、作品测试结果**：性能指标数据（标记[表X：测试数据]位置）、与设计目标对比
    5. **四、创新点分析**：逐条列出创新点，每条附与现有技术/产品的具体对比
    6. **五、实际应用情况与应用前景**：已有应用案例、用户反馈、预期应用场景
    7. **六、存在问题与下一步工作**：诚实反映当前不足，提出具体改进计划
    8. **附件说明**：外观图/照片、鉴定证书、应用证明、专利证书等

  output_sections:
    - section_id: "brief"
      title: "作品说明（≤1000字）"
    - section_id: "purpose"
      title: "作品设计目的与意义"
    - section_id: "process"
      title: "制作过程与技术方案"
    - section_id: "results"
      title: "作品测试结果"
    - section_id: "innovation"
      title: "创新点分析"
    - section_id: "application"
      title: "实际应用情况与应用前景"
    - section_id: "problems"
      title: "存在问题与下一步工作"
    - section_id: "appendix"
      title: "附件"

  format_spec:
    word_limit_brief: 1000
    word_limit_report: 3000
    page_size: "A4"

  checklist:
    - "专利证书/专利申请受理通知书"
    - "软件著作权证书"
    - "技术鉴定证书/第三方检测报告"
    - "应用单位证明（含联系人、联系电话）"
    - "原理结构图、外观图/实物照片"
    - "实物演示视频"
    - "测试报告/用户反馈"

  tips:
    - "作品说明要让人30秒内看懂作品是什么"
    - "技术方案部分图优于表、表优于文字"
    - "创新点必须在与现有技术的对比中体现"
    - "不要回避作品的不足，诚实反而加分"
    - "应用证明需来自独立第三方，合作单位证明无效"

