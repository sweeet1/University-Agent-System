  material_type: "innovation_contest_business_plan"
  description: "中国国际大学生创新大赛商业计划书，含12章+附件"
  word_limit: "不限，建议60-70页（含附录）"
  reference_template: "附件2+创业计划书模板.docx / 附件2：项目计划书模版.docx / 附件5：创业项目计划书.docx"

  system: |
    你是熟悉中国国际大学生创新大赛（原"互联网+"）的商业计划书写作专家。
    你精通商业计划书的12章结构和评审要点，了解不同赛道（高教主赛道/青年红色筑梦之旅/职教赛道等）的侧重点。

    ## 特别注意
    - 商业计划书是核心材料，评审比重最大
    - 数据必须真实，引用需标注来源（注明年份和出处）
    - 财务预测要合理（3-5年），不能虚高
    - 商业模式必须清晰，盈利逻辑要经得起推敲
    - 竞品分析须客观，不能用不存在的竞品或虚假数据
    - 知识产权归属须清晰，创始人股权>67%
    - 章节之间逻辑要连贯：痛点→方案→市场→模式→团队→财务→融资

  user_template: |
    请根据以下信息，生成中国国际大学生创新大赛的商业计划书：

    ## 项目基本信息
    - 项目名称：{project_name}
    - 参赛赛道：{track}
    - 参赛组别：{group}
    - 项目类型：{project_type}
    - 是否已注册公司：{is_registered}
    - 营业执照编号：{license_number}

    ## 项目详情
    - 项目slogan/一句话介绍：{slogan}
    - 核心痛点：{background}
    - 解决方案：{solution}
    - 产品/服务描述：{product_description}
    - 技术原理与优势：{technical_approach}
    - 创新点：{innovation_points}
    - 知识产权情况：{ip_status}

    ## 市场与商业
    - 目标市场：{target_market}
    - 市场规模与趋势：{market_size}
    - 竞品分析：{competitor_analysis}
    - 商业模式：{business_model}
    - 盈利方式：{revenue_model}
    - 营销策略：{marketing_strategy}

    ## 团队与公司
    {team_members}
    {advisor}
    - 公司成立时间与注册资本：{company_info}

    ## 财务与融资
    - 已有营收/运营数据：{financial_data}
    - 融资需求：{funding_needed}
    - 资金用途：{funding_usage}

    ## 成果与社会价值
    - 已有成果：{achievements}
    - 社会价值：{social_value}

    请按照以下结构生成商业计划书：

    1. **封面**：项目名称(含LOGO)、赛道组别、团队信息、日期
    2. **目录**（自动生成至三级标题）
    3. **第一章 执行概要**（1000-1500字）：浓缩项目核心亮点
    4. **第二章 项目背景**：政策背景、行业趋势、核心痛点深度分析
    5. **第三章 产品与服务**：功能描述、技术原理、创新优势（与竞品对比表）、知识产权、用户反馈
    6. **第四章 市场分析**：市场规模与趋势、目标用户画像、竞争分析、SWOT分析
    7. **第五章 市场营销**：定价策略、销售渠道、推广方案
    8. **第六章 商业模式**：商业画布九要素、盈利模式、成本结构
    9. **第七章 公司战略**：愿景使命、短/中/长期目标
    10. **第八章 团队介绍**：创始人、核心成员（专业互补+分工）、指导教师、专家顾问
    11. **第九章 财务分析**：财务假设、三张报表预测（3-5年）、关键财务指标
    12. **第十章 风险评估及对策**：技术/市场/财务/政策四类风险+应对策略
    13. **第十一章 项目融资说明**：融资需求、股权出让比例、资金用途明细
    14. **第十二章 保险与法律事务**：知识产权归属、合规说明
    15. **附件**：专利证书、查新报告、检测报告、合作协议、用户反馈、营业执照等

  output_sections:
    - section_id: "cover"
      title: "封面"
    - section_id: "toc"
      title: "目录"
    - section_id: "executive_summary"
      title: "第一章 执行概要"
    - section_id: "background"
      title: "第二章 项目背景"
    - section_id: "product"
      title: "第三章 产品与服务"
    - section_id: "market"
      title: "第四章 市场分析"
    - section_id: "marketing"
      title: "第五章 市场营销"
    - section_id: "business_model"
      title: "第六章 商业模式"
    - section_id: "strategy"
      title: "第七章 公司战略"
    - section_id: "team"
      title: "第八章 团队介绍"
    - section_id: "finance"
      title: "第九章 财务分析"
    - section_id: "risk"
      title: "第十章 风险评估及对策"
    - section_id: "financing"
      title: "第十一章 项目融资说明"
    - section_id: "legal"
      title: "第十二章 保险与法律事务"
    - section_id: "appendix"
      title: "附件"

  format_spec:
    page_suggestion: "60-70页（含附录）"
    file_format: "PDF/Word"
    file_size_limit: "≤20MB"

  checklist:
    - "专利证书扫描件"
    - "软件著作权证书"
    - "科技查新报告"
    - "第三方检测报告"
    - "销售合同/服务协议"
    - "意向客户清单/合作备忘录"
    - "营业执照扫描件（创业组必传）"
    - "财务报表/审计报告（创业组必传）"
    - "团队成员获奖证书"
    - "合作协议/授权书"

  tips:
    - "执行概要是最重要的章节，评审可能只细读这一章"
    - "市场数据需引用权威来源（艾瑞、易观、政府统计公报等）"
    - "竞品分析要客观，建议用对比表呈现"
