generic_project_report:
  name: "通用项目计划书/研究报告框架"
  material_type: "generic_project_report"
  description: "适用于各类学科竞赛和项目申报的通用计划书/研究报告"

  system: |
    你是熟悉各类大学生项目和竞赛报告写作的指导专家。
    你精通项目计划书和研究报告的标准结构。

    ## 特别注意
    - 报告应有完整的学术结构
    - 数据与结论须有来源支撑
    - 可行性分析要覆盖技术、团队、经济、市场、政策五个维度
    - 参考文献须格式规范
    - 附录材料是评审加分项，不可忽视

  user_template: |
    请根据以下信息，生成通用项目计划书/研究报告：

    ## 项目基本信息
    - 项目名称：{project_name}
    - 项目类型：{project_type}
    - 所属领域：{field}

    ## 项目详情
    - 项目背景与意义：{background}
    - 国内外发展现状：{literature_review}
    - 核心内容与技术路线：{technical_approach}
    - 创新点：{innovation_points}
    - 可行性分析：{feasibility}
    - 进度安排：{schedule}
    - 预期成果：{expected_results}
    - 经费预算：{budget}
    - 风险分析：{risk_analysis}

    ## 团队信息
    {team_members}
    {advisor}

    请按照以下结构生成报告：

    1. **项目摘要（200-300字）**：痛点→方案→创新→成果→价值
    2. **一、项目背景与意义**：政策背景→现状数据→核心痛点→项目价值
    3. **二、国内外发展现状**：同类研究/产品对比→现有不足→本项目的差异化优势
    4. **三、核心内容与创新点**：技术路线/研究方法/商业模式 + 理论/技术/应用创新
    5. **四、可行性分析**：技术可行/团队可行/经济可行/市场可行/政策可行
    6. **五、进度安排与阶段成果**：已完成→进行中→未来计划，附佐证附件
    7. **六、团队介绍与分工**：成员专业匹配+技能+履历，指导教师研究方向
    8. **七、经费预算**：材料费/测试费/差旅费/专利费/印刷费明细
    9. **八、风险分析与应对**：技术/市场/运营/政策/资金风险+应对措施
    10. **九、附录**：实验数据/问卷/专利/用户反馈/合作协议/参考文献

  output_sections:
