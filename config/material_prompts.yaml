challenge_cup_grand_report_social:
  name: "大挑-哲学社会科学类社会调查报告"
  material_type: "challenge_cup_grand_report_social"
  description: "挑战杯哲学社会科学类社会调查报告和学术论文"
  word_limit: "≤15000字"
  subject_areas: ["哲学", "经济", "社会", "法律", "教育", "管理"]
  topic_groups: ["发展成就", "文明文化", "美丽中国", "民生福祉", "中国之治"]

  system: |
    你是熟悉"挑战杯"哲学社会科学类社会调查报告写作的指导专家。
    你精通社会调查方法，了解大挑社科类报告的评审维度和加分要点。

    ## 特别注意
    - 字数控制在15000字以内
    - 调研方法必须规范（问卷抽样、访谈提纲、调研过程需交代清楚）
    - 数据分析需有理有据，定性与定量结合
    - 对策建议需有针对性、可操作性
    - 附件须包含调研工具（问卷样本、访谈提纲等）
    - 报告应体现社会价值和现实意义

  user_template: |
    请根据以下信息，生成"挑战杯"哲学社会科学类社会调查报告：

    ## 报告基本信息
    - 报告题目：{project_name}
    - 所属学科：{subject_area}
    - 选题方向：{topic_group}
    - 调研时间：{survey_time}
    - 调研地点：{survey_location}

    ## 调研详情
    - 调研背景与问题：{background}
    - 调研目的：{survey_purpose}
    - 调研方法：{survey_method}
    - 调研对象与样本量：{survey_subjects}
    - 主要发现：{key_findings}
    - 创新点：{innovation_points}

    ## 团队成员
    {team_members}

    ## 指导教师
    {advisor}

    请按照以下结构生成社会调查报告：

    1. **封面**：报告题目、学院、作者、指导教师、日期
    2. **摘要**（200-300字）：调研背景、方法、主要发现和建议
    3. **一、调研背景与目的**：政策背景、社会问题阐述、调研目的与意义
    4. **二、调研方法与过程**：问卷设计说明、访谈对象、抽样方式、调研时间与地点、样本基本情况
    5. **三、调研发现与数据分析**（核心章节）：分维度呈现调研结果，含数据图表标记位置
    6. **四、问题成因分析**：结合理论与实证，深入分析问题产生的根源
    7. **五、对策建议**：基于调研发现提出切实可行的政策建议或解决方案
    8. **六、结论**：总结核心发现、创新之处与研究局限
    9. **附件说明**：问卷样本、访谈提纲、调研照片、被调研单位反馈函等

  output_sections:
    - section_id: "cover"
      title: "封面"
    - section_id: "abstract"
      title: "摘要"
    - section_id: "introduction"
      title: "调研背景与目的"
    - section_id: "method"
      title: "调研方法与过程"
    - section_id: "findings"
      title: "调研发现与数据分析"
    - section_id: "analysis"
      title: "问题成因分析"
    - section_id: "suggestions"
      title: "对策建议"
    - section_id: "conclusion"
      title: "结论"
    - section_id: "appendix"
      title: "附件"

  format_spec:
    font: "4号楷体"
    page_size: "A4"
    word_limit: 15000

  checklist:
    - "调研问卷样本（含发放数量、回收数量、有效数量）"
    - "访谈提纲及访谈记录"
    - "调研过程照片（含时间地点标注）"
    - "被调研单位反馈函/采纳证明"
    - "党政领导批示（如有）"
    - "已发表相关论文"
    - "主流媒体宣传报道"
    - "查重报告"

  tips:
    - "选题建议紧扣当年时政热点和社会需求"
    - "调研样本量不能太少，建议不低于100份有效问卷"
    - "问题成因分析要有理论支撑，避免泛泛而谈"
    - "对策建议要具体可行，避免空洞口号"
    - "附件材料越详实，评审说服力越强"

