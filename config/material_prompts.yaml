challenge_cup_business_application:
  name: "小挑-项目申报书"
  material_type: "challenge_cup_business_application"
  description: "挑战杯中国大学生创业计划竞赛作品申报书"
  reference_template: "附件4+浙江省第十五届挑战杯大学生创业计划竞赛作品申报书.docx"
  category: "挑战杯系列-小挑"

  system: |
    你是熟悉"挑战杯"中国大学生创业计划竞赛（小挑）申报流程的指导专家。
    你了解申报书的填写规范，包括校赛、省赛、国赛不同层级的申报要求。

    ## 特别注意
    - 申报书是正式参赛文件，信息须准确无误
    - 团队成员信息须与学籍信息一致
    - 项目简介要精炼，突出创业项目的核心价值
    - 指导教师信息须完整
    - 申报书中可能需要学院/学校盖章处，用标记提示
    - 校赛、省赛、国赛申报表格式可能略有差异

  user_template: |
    请根据以下信息，生成小挑作品申报书内容：

    ## 项目基本信息
    - 项目名称：{project_name}
    - 参赛组别：{group}
    - 所属学院：{college}
    - 申报日期：{submission_date}
    - 所属领域：{field}

    ## 项目简述
    - 项目简介（≤500字）：{summary}

    ## 团队成员
    {team_members}

    ## 指导教师
    {advisor}

    ## 项目详情
    - 项目亮点与创新性：{innovation_points}
    - 市场前景与应用价值：{application_value}
    - 已有成果：{achievements}

    请按照以下结构生成申报书内容：

    1. **基本信息**：项目名称、参赛组别、所属学院、申报日期
    2. **团队成员列表**：姓名、学号、专业、年级、联系电话、在项目中承担角色
    3. **指导教师信息**：姓名、职称、研究方向、联系电话、对项目的指导贡献
    4. **项目简介（≤500字）**：创业项目的核心亮点——解决什么问题、怎么解决、有什么成果
    5. **项目详述**：创新性、市场前景、社会价值、团队优势
    6. **知识产权声明**：确认知识产权归属清晰
    7. **学院/学校意见**：标记 [需学院盖章] 和 [需学校盖章] 位置

  output_sections:
    - section_id: "basic"
      title: "基本信息"
    - section_id: "members"
      title: "团队成员"
    - section_id: "advisor"
      title: "指导教师"
    - section_id: "project_brief"
      title: "项目简介（≤500字）"
    - section_id: "project_detail"
      title: "项目详述"
    - section_id: "ip"
      title: "知识产权声明"
    - section_id: "approval"
      title: "学院/学校意见"

  format_spec:
    word_limit_brief: 500
    page_size: "A4"

  checklist:
    - "团队成员学生证复印件"
    - "指导教师职称证明"
    - "营业执照扫描件（如已注册公司）"
    - "知识产权归属证明"

  tips:
    - "校赛阶段先确认学校使用的申报表版本（校级格式还是省级格式）"
    - "项目简介是评审第一印象，500字务必精炼有力"
    - "团队成员信息须与学籍系统完全一致"
    - "盖章处提前联系学院团委/教务处确认流程和时间"
    - "省赛和国赛申报表格式可能更新，需关注最新通知"

