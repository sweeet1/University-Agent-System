challenge_cup_business_ppt:
  name: "小挑-路演PPT"
  material_type: "challenge_cup_business_ppt"
  description: "挑战杯中国大学生创业计划竞赛路演答辩PPT"
  page_limit: "≤20页，5-8分钟讲解节奏"
  reference_template: "第十五届挑战杯中国大学生创业计划竞赛汇报模板.pptx"
  category: "挑战杯系列-小挑"

  system: |
    你是熟悉"挑战杯"中国大学生创业计划竞赛（小挑）路演答辩的PPT设计专家。
    你了解小挑评审的五大维度和PPT的叙事逻辑。

    ## 小挑评审维度（各20分，满分100）
    1. **社会价值（20分）**：项目对社会进步、民生改善、区域发展的贡献
    2. **实践过程（20分）**：从创意到落地的完整实践过程，团队做了哪些具体工作
    3. **创新意义（20分）**：技术/模式/应用的创新性及其行业影响
    4. **发展前景（20分）**：项目的可持续性、可复制性、成长空间
    5. **团队协作（20分）**：成员能力结构与项目需求的匹配度、分工协作

    ## 特别注意
    - 时间控制在 5-8 分钟，页数不超过 20 页
    - PPT 内容必须与商业计划书一致
    - "实践过程"是小挑区别于其他创业竞赛的核心得分点
    - 社会价值要有具体案例或数据支撑

  user_template: |
    请根据以下信息，生成小挑路演PPT的内容大纲和每页文案：

    ## 项目基本信息
    - 项目名称：{project_name}
    - 参赛组别：{group}
    - 一句话定位：{slogan}

    ## 项目内容
    - 核心痛点：{background}
    - 解决方案：{solution}
    - 产品/服务亮点：{product_description}
    - 技术/模式优势：{technical_approach}
    - 创新点：{innovation_points}
    - 知识产权：{ip_status}

    ## 市场与商业
    - 市场规模：{market_size}
    - 竞品对比：{competitor_analysis}
    - 商业模式：{business_model}
    - 盈利方式：{revenue_model}

    ## 运营与成果
    - 实践过程与关键节点：{current_progress}
    - 运营数据与验证结果：{key_results}
    - 已有成果与荣誉：{achievements}

    ## 团队与社会价值
    {team_members}
    {advisor}
    - 社会价值与贡献：{social_value}
    - 发展规划与愿景：{expected_results}
    - 财务数据与融资：{financial_summary}

    请按照以下结构生成PPT内容（每页含：页标题、核心文案、建议配图、建议讲解时长）：

    1. **封面**（5秒）：项目名称 + slogan + 组别 + 学校/团队名称
    2. **痛点分析**（40秒）：核心痛点可视化 —— 用数据/场景图展示问题严重性
    3. **解决方案**（30秒）：一句话说清方案 + 解决方案概览图
    4. **产品/服务展示**（40秒）：核心功能演示、界面/实物展示、应用场景
    5. **创新优势**（30秒）：与竞品的差异化对比表，突出独家优势
    6. **技术/资源壁垒**（20秒）：专利/IP/核心资源，证明不可替代性
    7. **市场分析**（20秒）：市场规模 + 目标用户画像
    8. **商业模式**（20秒）：简明商业画布 —— 怎么赚钱 + 怎么推广
    9. **实践过程**（40秒）：团队从创意到落地的关键节点、实地工作照片、试点数据（小挑核心得分页）
    10. **运营成果**（30秒）：关键数据 + 用户反馈 + 合作证明
    11. **社会价值**（30秒）：具体案例 + 量化社会贡献（带动就业/服务人群/区域发展）
    12. **团队介绍**（20秒）：核心成员 + 专业互补 + 指导老师 + 获奖情况
    13. **财务与规划**（20秒）：关键财务数据 + 融资需求 + 3年里程碑
    14. **结尾**（5秒）：愿景 slogan + 致谢 + 二维码/联系方式

  output_sections:
    - slide: 1
      title: "封面"
    - slide: 2
      title: "痛点分析"
    - slide: 3
      title: "解决方案"
    - slide: 4
      title: "产品/服务展示"
    - slide: 5
      title: "创新优势"
    - slide: 6
      title: "技术/资源壁垒"
    - slide: 7
      title: "市场分析"
    - slide: 8
      title: "商业模式"
    - slide: 9
      title: "实践过程"
    - slide: 10
      title: "运营成果"
    - slide: 11
      title: "社会价值"
    - slide: 12
      title: "团队介绍"
    - slide: 13
      title: "财务与规划"
    - slide: 14
      title: "结尾"

  format_spec:
    page_limit: 20
    file_format: "PPT/PDF"
    presentation_time: "5-8分钟"

  checklist:
    - "项目Logo（高清矢量图/PNG）"
    - "产品/服务展示图（界面截图/实物照片）"
    - "实践过程照片（团队工作照、调研照、用户访谈照）"
    - "核心数据图表（确保投影清晰）"
    - "团队高清合照"
    - "专利/证书扫描件截图"
    - "用户反馈/合作证明截图"
    - "联系方式二维码"

  tips:
    - "实践过程是小挑区别于互联网+的最大特色，多放真实工作照片"
    - "社会价值用具体故事 + 数据，不要空洞口号"
    - "竞品对比要实事求是，不恶意贬低对手"
    - "5 分钟精简版讲 10-12 页，8 分钟完整版讲 14-16 页"
    - "提前准备好 5 分钟精简版和 8 分钟完整版两个版本"
    - "PPT 字体用系统自带字体（宋体/黑体），避免拷贝后乱码"

