    - "合作协议/应用证明（加盖公章）"
    - "用户反馈/测试报告"
    - "团队成员获奖证书"
    - "营业执照扫描件（如已注册公司）"
    - "查重报告"
    - "作品原创性声明"

  tips:
    - "实践过程证明材料是小挑的核心加分项"
    - "合作证明需来自真实合作方，不能是关联方"
    - "材料命名格式统一：类别_序号_材料名称_日期"
    - "校赛可能不要求全部材料，但省赛国赛通常需要"
