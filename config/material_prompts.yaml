challenge_cup_grand_paper_natural:
  name: "大挑-自然科学类学术论文"
  material_type: "challenge_cup_grand_paper_natural"
  description: "挑战杯自然科学类学术论文，限本专科生"
  word_limit: "≤8000字"
  format: "4号楷体/仿宋体，A4纸，版面14.5×22cm"

  system: |
    你是熟悉"挑战杯"自然科学类学术论文写作的指导专家。
    你精通学术论文的结构规范，了解大挑对自然科学论文的评审标准。

    ## 特别注意
    - 字数严格控制在8000字以内
    - 中英文摘要各200-300字，关键词3-5个
    - 参考文献格式须符合GB/T 7714标准
    - 图表须有编号和标题，数据须真实可查
    - 论文作者须与作品作者一致，学生为第一作者
    - 如引用他人成果，必须明确标注出处

  user_template: |
    请根据以下信息，生成"挑战杯"自然科学类学术论文：

    ## 论文基本信息
    - 论文题目：{project_name}
    - 学科分类：{subject_category}
    - 作者信息：{author_info}

    ## 研究详情
    - 研究背景：{background}
    - 研究方法与技术路线：{technical_approach}
    - 实验方案：{experimental_plan}
    - 主要数据与结果：{key_results}
    - 创新点：{innovation_points}
    - 已有成果：{achievements}

    请按照以下结构生成学术论文：

    1. **题目、摘要、关键词**（中英文各200-300字，关键词3-5个）
    2. **引言**：研究背景、国内外研究现状、研究目的与意义
    3. **研究方法与实验方案**：技术路线、实验设计、数据来源、实验设备
    4. **研究结果与分析**：含图表描述位置标记（用[图X：标题]和[表X：标题]标记）、数据分析
    5. **讨论**：结果解释、与前人研究对比、创新点分析、局限性讨论
    6. **结论**：主要发现、科学意义、不足之处、下一步工作
    7. **参考文献**：GB/T 7714标准格式，标记[需根据实际引用补充]

  output_sections:
    - section_id: "title_abstract"
      title: "题目、摘要、关键词"
    - section_id: "introduction"
      title: "引言"
    - section_id: "methods"
      title: "研究方法与实验方案"
    - section_id: "results"
      title: "研究结果与分析"
    - section_id: "discussion"
      title: "讨论"
    - section_id: "conclusion"
      title: "结论"
    - section_id: "references"
      title: "参考文献"

  format_spec:
    font: "4号楷体或仿宋体"
    page_size: "A4"
    page_layout: "版面14.5×22cm"
    word_limit: 8000

  checklist:
    - "实验原始数据记录"
    - "实验照片/图表原文件"
    - "检索证明/查新证明"
    - "影响因子证明（如发表SCI论文）"
    - "论文查重报告"

  tips:
    - "中英文摘要需精炼，避免与引言重复"
    - "图表编号连续，图题在图下方，表题在表上方"
    - "参考文献不少于10篇，需包含近3年文献"
    - "避免出现'国内首创''国际领先'等自我评价用语"

