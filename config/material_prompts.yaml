  system: |
    你是熟悉"挑战杯"竞赛答辩PPT制作的设计专家。
    你了解评审专家的关注重点和PPT的视觉传达原则。

    ## 特别注意
    - 总页数控制在20页以内
    - 每页内容精简，避免大段文字
    - 数据可视化优先（图、表、数据突出展示）
    - 逻辑线清晰：问题→方案→创新→成果→团队
    - 封面必须包含作品名称、学校、团队信息
    - 结尾包含致谢和联系方式

  user_template: |
    请根据以下信息，生成"挑战杯"项目介绍PPT的内容大纲和每页文案：

    ## 项目基本信息
    - 作品名称：{project_name}
    - 作品类别：{category}
    - 所属学校/学院：{college}

    ## 项目内容
    - 痛点问题：{background}
    - 解决方案/技术方案：{technical_approach}
    - 创新点：{innovation_points}
    - 关键数据/实验结果：{key_results}
    - 与现有技术对比：{competitor_comparison}
    - 应用价值：{application_value}
    - 已有成果：{achievements}

    ## 团队信息
    {team_members}
    {advisor}

    请按照以下结构生成PPT内容（每页包含：页标题、核心文案要点、建议配图类型）：

    1. **封面**：作品名称、学校、团队、指导教师
    2. **目录**：汇报结构概览
    3. **项目背景**：痛点问题+政策/行业背景，建议配数据图/场景图
    4. **研究现状**：国内外同类研究/产品对比，建议用对比表
    5. **技术方案（一）**：技术路线/研究方法概览，建议用流程图
    6. **技术方案（二）**：核心技术细节（如有），建议用原理图
    7. **创新点**：3-4个核心创新点，每点配简短佐证
    8. **实验结果/调研数据**：关键数据图表展示
    9. **成果展示**：论文/专利/获奖成果列表
    10. **应用价值**：实际应用案例、社会/经济效益
    11. **团队介绍**：成员分工+专业互补性展示
    12. **研究计划**：后续工作时间节点
    13. **参考文献/致谢**：主要参考文献、协作单位、联系方式

  output_sections:
    - slide: 1
      title: "封面"
    - slide: 2
      title: "目录"
    - slide: 3
      title: "项目背景"
    - slide: 4
      title: "研究现状"
    - slide: 5
      title: "技术方案（一）"
    - slide: 6
      title: "技术方案（二）"
    - slide: 7
      title: "创新点"
    - slide: 8
      title: "实验结果/调研数据"
    - slide: 9
      title: "成果展示"
    - slide: 10
      title: "应用价值"
    - slide: 11
      title: "团队介绍"
    - slide: 12
      title: "研究计划"
    - slide: 13
      title: "参考文献/致谢"

  format_spec:
    page_limit: 20
    output_file_type: "PDF"

  checklist:
    - "高清作品照片/实物图"
    - "原理结构图（矢量格式）"
    - "数据图表（确保可读性）"
    - "专利/论文扫描件截图"
    - "团队合照"
    - "应用现场照片"

  tips:
    - "每页文字不超过7行，字号不小于18pt"
    - "动画效果适度，不要影响内容传达"
    - "提前测试PDF字体嵌入和图片清晰度"
    - "准备备用版本（不含动画的PDF）"

