challenge_cup_business_plan:
  name: "小挑-创业计划书"
  material_type: "challenge_cup_business_plan"
  description: "挑战杯中国大学生创业计划竞赛商业计划书"
  word_limit: "不限，建议30-50页"
  reference_template: "第十五届挑战杯中国大学生创业计划竞赛商业计划书模板.doc"
  category: "挑战杯系列-小挑"

  system: |
    你是熟悉"挑战杯"中国大学生创业计划竞赛（小挑）的商业计划书写作专家。
    小挑是由共青团中央、教育部、中国科协、全国学联等共同主办的全国性创业竞赛。

    ## 小挑与互联网+的核心差异
    - 小挑由共青团系统主办，评审更侧重创业计划的可行性、实践过程和社会价值
    - 五大组别：科技创新和未来产业、乡村振兴和农业农村现代化、社会治理和公共服务、
      生态环保和可持续发展、文化创意和区域合作
    - 更关注项目的社会价值和实际可操作性，不强制要求注册公司
    - 评审维度：社会价值、实践过程、创新意义、发展前景、团队协作（各20分）

    ## 官方模板 10 章结构（不可更改顺序）
    1. 执行摘要（≤800字）
    2. 项目背景
    3. 项目介绍
    4. 市场分析
    5. 商业模式
    6. 团队介绍
    7. 财务分析
    8. 社会价值
    9. 风险控制
    10. 未来展望

    ## 特别注意
    - 执行摘要≤800字（官方硬性要求）
    - 数据引用须标注来源和年份
    - 实践过程是评审重点：团队做了哪些具体工作、取得了什么进展
    - 社会价值要具体：带动就业人数、服务区域、改善民生等量化指标

  user_template: |
    请根据以下信息，生成"挑战杯"中国大学生创业计划竞赛（小挑）商业计划书：

    ## 项目基本信息
    - 项目名称：{project_name}
    - 参赛组别：{group}
    - 所属领域：{field}

    ## 项目详情
    - 项目slogan/一句话定位：{slogan}
    - 核心痛点：{background}
    - 解决方案：{solution}
    - 产品/服务描述：{product_description}
    - 技术路线与核心优势：{technical_approach}
    - 创新点：{innovation_points}
    - 知识产权情况：{ip_status}

    ## 市场与商业
    - 目标市场与用户：{target_market}
    - 市场规模与趋势：{market_size}
    - 竞品分析：{competitor_analysis}
    - 盈利模式：{revenue_model}
    - 运营模式：{operation_model}
    - 营销策略：{marketing_strategy}

    ## 团队与运营
    {team_members}
    {advisor}
    - 项目当前进展：{current_progress}
    - 已有运营数据：{financial_data}

    ## 财务与社会价值
    - 成本结构与盈利预测：{cost_structure}
    - 融资计划：{funding_needed}
    - 融资用途：{funding_usage}
    - 社会价值与贡献：{social_value}
    - 已有成果：{achievements}

    请严格按照官方 10 章模板结构生成商业计划书：

    1. **执行摘要（≤800字）**：
       项目痛点→解决方案→核心技术→商业模式→市场前景→团队优势→社会价值。
       要求独立成章，让评审在 2 分钟内了解项目全貌。

    2. **项目背景**：
       - 行业现状与痛点分析（引用权威数据，注明来源）
       - 政策环境与时代机遇
       - 目标用户群体与需求分析
       - 项目要解决的核心问题及意义

    3. **项目介绍**：
       - 产品/服务的功能定位与核心价值
       - 核心技术/核心资源（原理、架构、关键环节）
       - 创新点分析（逐条列出，与现有方案对比）
       - 知识产权情况（专利/软著/论文等，标注申请/授权状态）
       - 研发历程与关键节点（从创意到当前阶段）
       - 已有应用案例/试点效果/用户反馈
       - 项目竞争力分析（与同类竞品的差异化对比表）

    4. **市场分析**：
       - 行业发展趋势（引用权威行业报告数据）
       - 市场边界与细分市场定位
       - 目标市场规模（TAM/SAM/SOM，标注数据来源）
       - 主要竞品分析（列出 2-4 家，对比产品/价格/渠道/技术）
       - 项目 SWOT 分析或竞争定位

    5. **商业模式**：
       - 盈利模式（核心收入来源、定价策略、盈利逻辑）
       - 运营模式（业务流程、供应链、关键合作伙伴）
       - 营销策略（推广渠道、获客方式、客户关系管理）
       - 商业模式可行性与可持续性分析

    6. **团队介绍**：
       - 创始人/核心成员（姓名、专业、核心能力、分工）
       - 团队专业互补性（技术+市场+运营+管理）
       - 指导教师（职称、研究方向、对项目的具体指导贡献）
       - 团队协作机制与过往成果

    7. **财务分析**：
       - 启动资金与成本结构（固定成本/变动成本明细）
       - 收入预测（未来 3 年，含关键假设）
       - 核心财务指标（毛利率、净利率、投资回报周期）
       - 现金流预测
       - 融资计划（融资金额、出让股权比例、资金用途明细）
       - 如已成立公司：当前营收规模与盈利状况

    8. **社会价值**：
       - 带动就业（直接就业人数+间接带动）
       - 促进区域发展/乡村振兴/产业升级
       - 改善民生/提升公共服务水平
       - 生态环保/可持续发展贡献
       - 其他社会效益（用具体案例和数据说明）

    9. **风险控制**：
       - 技术风险及应对
       - 市场风险及应对
       - 运营风险及应对
       - 政策风险及应对
       - 资金风险及应对

    10. **未来展望**：
        - 短期目标（1年）、中期目标（2-3年）、长期愿景（5年）
        - 关键里程碑与时间节点
        - 可持续发展规划

    格式要求：
    - 正文小四号宋体，1.5倍行距
    - 一级标题三号黑体，二级标题四号黑体
    - 图表统一编号（图1、表1），标注数据来源
    - 参考文献按 GB/T 7714 格式

  output_sections:
    - section_id: "executive_summary"
      title: "一、执行摘要（≤800字）"
    - section_id: "background"
      title: "二、项目背景"
    - section_id: "project_intro"
      title: "三、项目介绍"
    - section_id: "market"
      title: "四、市场分析"
    - section_id: "business_model"
      title: "五、商业模式"
    - section_id: "team"
      title: "六、团队介绍"
    - section_id: "finance"
      title: "七、财务分析"
    - section_id: "social_value"
      title: "八、社会价值"
    - section_id: "risk"
      title: "九、风险控制"
    - section_id: "future"
      title: "十、未来展望"

  format_spec:
    page_suggestion: "30-50页"
    file_format: "PDF/Word"
    body_font: "小四号宋体"
    title_font_h1: "三号黑体"
    title_font_h2: "四号黑体"
    line_spacing: "1.5倍行距"
    word_limit_summary: 800

  checklist:
    - "商业计划书（PDF格式，按10章模板）"
    - "作品申报书（与商业计划书分开提交）"
    - "项目介绍PPT（用于答辩）"
    - "专利/软著证书扫描件"
    - "合作协议/应用证明（加盖公章）"
    - "团队获奖证书"
    - "用户反馈/试用报告"
    - "查重报告"

  tips:
    - "执行摘要≤800字是硬性要求，超字数会被扣分"
    - "小挑评审重视实践过程和社会价值，不要只写商业宏大叙事"
    - "团队分工要体现真正的专业互补，避免挂名"
    - "财务数据要自洽，假设要合理"
    - "社会价值要有具体案例和数据，不要空话"
    - "参考模板为第十五届官方模板，章节顺序不可更改"
    - "校赛→省赛→国赛三级，每级评审标准可能略有差异"

