      title: "项目摘要（200-300字）"
    - section_id: "background"
      title: "项目背景与意义"
    - section_id: "literature"
      title: "国内外发展现状"
    - section_id: "core"
      title: "核心内容与创新点"
    - section_id: "feasibility"
      title: "可行性分析"
    - section_id: "schedule"
      title: "进度安排与阶段成果"
    - section_id: "team"
      title: "团队介绍与分工"
    - section_id: "budget"
      title: "经费预算"
    - section_id: "risk"
      title: "风险分析与应对"
    - section_id: "appendix"
      title: "附录"

  format_spec:
    page_size: "A4"
    word_limit_abstract: 300

  checklist:
