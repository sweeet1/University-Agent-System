llm:
  enabled: true
  provider: deepseek
  # Store the actual key in the DEEPSEEK_API_KEY environment variable.
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-chat
  timeout: 30

info_collect:
  request_delay_min: 1
  request_delay_max: 3
  max_pages: 10

storage:
  raw_data_path: ./data/raw
  processed_data_path: ./data/processed
  output_path: ./data/output
  temp_path: ./data/temp
  log_path: ./logs

agent:
  timeout: 60
  max_retry: 3
  info_extract:
    prompt_file: ./config/extraction_prompt.yaml
