llm:
  enabled: true
  provider: deepseek
  # Store the actual key in the DEEPSEEK_API_KEY environment variable.
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-chat
  timeout: 30

info_collect:
  request_delay_min: 1
  request_delay_max: 3
  max_pages: 10

storage:
  raw_data_path: ./data/raw
  processed_data_path: ./data/processed
  output_path: ./data/output
  temp_path: ./data/temp
  log_path: ./logs

agent:
  timeout: 60
  max_retry: 3
  info_extract:
    prompt_file: ./config/extraction_prompt.yaml
  material_agent:
    default_style: formal
    default_language: zh-CN
    prompt_config_path: ./config/material_prompts.yaml

recommendation:
  hard_constraints: true
  hard_major_min_score: 50
  weights:
    interest_score: 0.30
    ability_score: 0.25
    deadline_score: 0.18
    team_score: 0.12
    grade_score: 0.10
    major_score: 0.05
  level_thresholds:
    S: 80
    A: 65
    B: 50
    C: 0
  caps:
    grade_score_below: 40
    ability_score_below: 30
    max_level: B
