llm:
  enabled: true
  provider: deepseek
  # Store the actual key in the DEEPSEEK_API_KEY environment variable.
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-chat
  timeout: 30

info_collect:
  request_delay_min: 1
  request_delay_max: 3
  max_pages: 10
  client_timeout: 10
  sources:
    saikr:
      enabled: true
      max_pages: 10
    jingsai52:
      enabled: true
      max_pages: 10
    ali_tianchi:
      enabled: true
      max_pages: 10
    heywhale:
      enabled: true
      max_pages: 10
    datafountain:
      enabled: true
      max_pages: 10

storage:
  # backend: json（本地文件）或 supabase（云端 PostgreSQL）
  backend: supabase
  raw_data_path: ./data/raw
  processed_data_path: ./data/processed
  output_path: ./data/output
  temp_path: ./data/temp
  log_path: ./logs
  # Supabase 配置（backend=supabase 时需要，也可通过环境变量设置）
  supabase_url: ${SUPABASE_URL}
  supabase_key: ${SUPABASE_ANON_KEY}

agent:
  timeout: 60
  max_retry: 3
  info_extract:
    prompt_file: ./config/extraction_prompt.yaml
  material_agent:
    default_style: formal
    default_language: zh-CN
    prompt_config_path: ./config/material_prompts.yaml

recommendation:
  hard_constraints: true
  hard_major_min_score: 50
  weights:
    interest_score: 0.30
    ability_score: 0.25
    deadline_score: 0.18
    team_score: 0.12
    grade_score: 0.10
    major_score: 0.05
  level_thresholds:
    S: 80
    A: 65
    B: 50
    C: 0
  caps:
    grade_score_below: 40
    ability_score_below: 30
    max_level: B
  # Step 4：多样性 + 赛事层级
  diversity:
    enabled: true
    max_per_category: 1
  prestige:
    enabled: true
    mode: soft_add   # soft_add | tie_break
    boost:
      national: 10
      provincial: 5
      association: 2
      city: 0
      unknown: 0
  # Step 5：外置词典
  synonyms_path: ./config/recommendation_synonyms.yaml
  majors_path: ./config/recommendation_majors.yaml
  # Step 7：质量门槛（低于 A 标备选；有主推时宁少勿滥）
  quality_gate:
    enabled: true
    min_primary_level: A
    allow_backup: true
    prefer_fewer: true
  # Top-N 文案润色（复用全局 llm；无 API Key 时自动回退规则文案）
  llm_copywriting:
    enabled: true
    polish_risk: true
    temperature: 0.3
    max_tokens: 280
    timeout: 20
