llm:
  enabled: true
  provider: deepseek
  # Store the actual key in the DEEPSEEK_API_KEY environment variable.
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  model: deepseek-chat
  timeout: 30

info_collect:
  max_results: 10             # 每次采集目标数量
  cache_max_age_hours: 24     # 数据库有效期（小时），超时后重新爬取
  request_delay_min: 0.5      # 翻页请求间隔最小值（秒）
  request_delay_max: 1.5      # 翻页请求间隔最大值（秒）
  max_pages: 3                # 每个数据源最大翻页数（首次全量可调大）
  client_timeout: 10          # 单个 HTTP 请求超时（秒）
  detail_limit: 30            # 每个源最多抓取详情条数（控制总耗时）
  crawl_timeout: 500          # 单次采集总超时（秒），5站全爬约需2-3分钟
  sources:
    saikr:
      enabled: true
      max_pages: 3
      detail_limit: 20        # 赛氪详情含正文，少抓几条
    jingsai52:
      enabled: true
      max_pages: 3
      detail_limit: 10        # HTML 详情页较慢，少抓几条
    ali_tianchi:
      enabled: true
      max_pages: 3  
      detail_limit: 0         # 列表 API 已有 introduction，不需要详情
    heywhale:
      enabled: true
      max_pages: 3
      detail_limit: 5         # 详情 API 8 个 Tab，数据量大只抓 5 条
    datafountain:
      enabled: true
      max_pages: 3
      detail_limit: 5         # DF 列表已有核心字段，详情只补正文

storage:
  # backend: json（本地文件）或 supabase（云端 PostgreSQL）
  backend: supabase
  raw_data_path: ./data/raw
  processed_data_path: ./data/processed
  output_path: ./data/output
  temp_path: ./data/temp
  log_path: ./logs
  # Supabase 配置（backend=supabase 时需要，也可通过环境变量设置）
  supabase_url: ${SUPABASE_URL}
  supabase_key: ${SUPABASE_ANON_KEY}

agent:
  timeout: 60
  max_retry: 3
  info_extract:
    prompt_file: ./config/extraction_prompt.yaml
  material_agent:
    default_style: formal
    default_language: zh-CN
    prompt_config_path: ./config/material_prompts.yaml

recommendation:
  hard_constraints: true
  hard_major_min_score: 50
  top_n: 3                 # MainAgent / rules 未传 top_n 时的默认条数
  recommendation_pool_size: 10  # 一次打分缓存池；扩容推荐时复用，不重跑抽取/评分
  weights:
    interest_score: 0.30
    ability_score: 0.25
    deadline_score: 0.18
    team_score: 0.12
    grade_score: 0.10
    major_score: 0.05
  level_thresholds:
    S: 80
    A: 65
    B: 50
    C: 0
  caps:
    grade_score_below: 40
    ability_score_below: 30
    max_level: B
  # Step 4：多样性 + 赛事层级
  diversity:
    enabled: true
    max_per_category: 1
  prestige:
    enabled: true
    mode: soft_add   # soft_add | tie_break
    boost:
      national: 10
      provincial: 5
      association: 2
      city: 0
      unknown: 0
  # Step 5：外置词典
  synonyms_path: ./config/recommendation_synonyms.yaml
  majors_path: ./config/recommendation_majors.yaml
  # Step 7：质量门槛（低于 A 标备选；有主推时宁少勿滥）
  quality_gate:
    enabled: true
    min_primary_level: A
    allow_backup: true
    prefer_fewer: true
  # 最终强制凑满 top_n（默认 3）：在多样性 / 砍 BC 之后执行，优先级最高
  force_top_n: true
  # DeepSeek Chat 精排兴趣/能力（无 Key 或失败时回退关键词分）
  semantic_rerank:
    enabled: true
    blend: 0.7          # 语义分权重；关键词为 1-blend
    pool_size: 8        # 按关键词初分取前 N 条精排
    temperature: 0.1
    max_tokens: 900
    timeout: 45
  # Top-N 文案润色（复用全局 llm；无 API Key 时自动回退规则文案）
  llm_copywriting:
    enabled: true
    polish_risk: true
    temperature: 0.3
    max_tokens: 280
    timeout: 20
